<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 - Forbidden</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; color: #333; text-align: center; padding: 50px; }
        h1 { font-size: 3em; color: #e74c3c; }
        p { font-size: 1.5em; color: #555; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; background-color: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        .button { display: inline-block; margin-top: 20px; padding: 10px 20px; font-size: 1.2em; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px; }
        .button:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>403 - Forbidden</h1>
        <p>Sorry, you do not have permission to access this page.</p>
        <a class="button" th:href="@{/}">Go Home</a>
    </div>
</body>
</html>
