<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          __integrity__="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" __crossorigin__="anonymous">
    <title>Products</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">E-commerce Shop</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto"></ul>
            <ul class="navbar-nav">
                <li class="nav-item active"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item active"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                <li class="nav-item active">
                    <a class="nav-link" th:href="@{/cart}">
                        🛒 Cart <span id="cart-count" class="badge badge-danger">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    <table class="table">
        <thead class="thead-light">
            <tr>
                <th scope="col">Serial No.</th>
                <th scope="col">Product Name</th>
                <th scope="col">Category</th>
                <th scope="col">Preview</th>
                <th scope="col">Quantity</th>
                <th scope="col">Price</th>
                <th scope="col">Weight</th>
                <th scope="col">Description</th>
                <th scope="col">Buy</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.category != null ? product.category.name : 'N/A'}"></td>
                <td><img th:src="${product.image}" height="100px" width="100px" alt="product"></td>
                <td th:text="${product.quantity}"></td>
                <td th:text="'$' + ${product.price}"></td>
                <td th:text="${product.weight}"></td>
                <td th:text="${product.description}"></td>
                <td>
                    <!-- Changed: removed form, using button with onclick -->
                    <button class="btn btn-warning"
                            th:data-product-id="${product.id}"
                            onclick="addToCart(this)">
                        Add To Cart
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>

<script>
    let cartCount = 0;

    function addToCart(btn) {
        const productId = btn.getAttribute('data-product-id');

        // Send request to backend in background (keeps your backend in sync)
        fetch(`/cart/products/addtocart?id=${productId}`, { method: 'GET' })
            .then(response => {
                if (!response.ok) {
                    console.error('Failed to add to cart');
                }
            });

        // Increment cart count in navbar
        cartCount++;
        document.getElementById('cart-count').textContent = cartCount;

        // Visual feedback on button
        btn.textContent = 'Added ✓';
        btn.classList.replace('btn-warning', 'btn-success');
        setTimeout(() => {
            btn.textContent = 'Add To Cart';
            btn.classList.replace('btn-success', 'btn-warning');
        }, 1000);
    }
</script>

</body>
</html>
