<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <title>My Cart</title>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">E-commerce Shop</a>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-4">
    <h3>Your Cart</h3>

    <div th:if="${carts == null or carts.isEmpty()}">
        <p class="text-muted">Your cart is empty.</p>
        <a th:href="@{/user/products}" class="btn btn-primary">Browse Products</a>
    </div>

    <table class="table" th:if="${carts != null and !carts.isEmpty()}">
        <thead class="thead-light">
            <tr>
                <th>Cart ID</th>
                <th>Customer</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cart : ${carts}">
                <td th:text="${cart.id}"></td>
                <td th:text="${cart.customer != null ? cart.customer.username : 'N/A'}"></td>
                <td>
                    <form th:action="@{/cart/delete}" method="post">
                        <input type="hidden" name="id" th:value="${cart.id}">
                        <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    
</div>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
</body>
</html>
